<!-- @dsCard group="Components" viewport="700x320" subtitle="Callout · TextButton · TerminalNote" name="Callout & inline" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body { padding: 22px; display: flex; flex-direction: column; gap: 14px; max-width: 560px; }
      .callout { border-radius: 0 var(--radius-card) var(--radius-card) 0; padding: 12px 14px; }
      .head { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
      .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
      .dot { width: 8px; height: 8px; border-radius: 50%; }
      .body { font-size: 13px; line-height: 1.5; color: var(--ink); }
      code { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); }
      .row { display: flex; gap: 16px; align-items: center; margin-top: 4px; }
      .tbtn { font: 12.5px var(--font-sans); color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
      .tbtn.muted { color: var(--ink-2); }
      .term { font-size: 12.5px; color: var(--ink-2); display: flex; gap: 7px; align-items: center; }
      .prompt { font-family: var(--font-mono); color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="callout" style="background:var(--auto-bg);border-left:3px solid var(--auto-fg)">
      <div class="head"><span class="dot" style="background:var(--auto-fg);animation:ws-pulse 1.6s ease-in-out infinite"></span><span class="eyebrow" style="color:var(--auto-fg)">Agent working</span></div>
      <div class="body">Addressing reviewer feedback on this PR…</div>
    </div>
    <div class="callout" style="background:var(--accent-soft);border-left:3px solid var(--accent)">
      <div class="head"><span class="eyebrow" style="color:var(--accent)">Rebase surfaced</span></div>
      <div class="body">Rebase too risky to do automatically — open a terminal to continue.</div>
    </div>
    <div class="callout" style="background:var(--surface-2);border-left:3px solid var(--line-2)">
      <div class="head"><span class="eyebrow" style="color:var(--ink-3)">Suggested approach</span></div>
      <div class="body">Chunk the backfill and checkpoint every 10k rows, or run it against a replica.</div>
    </div>
    <div class="row">
      <span class="tbtn">Undo</span>
      <span class="tbtn muted">Show more</span>
      <span class="term"><span class="prompt">›_</span>Terminal session opened.</span>
    </div>
  </body>
</html>
