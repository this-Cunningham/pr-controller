<!-- @dsCard group="Type" viewport="700x230" subtitle="Restrained size scale, 10.5 → 28px" name="Scale" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { padding: 22px; display: flex; flex-direction: column; gap: 9px; }
      .line { display: flex; align-items: baseline; gap: 14px; }
      .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); width: 170px; }
      .s { color: var(--ink); font-family: var(--font-sans); }
    </style>
  </head>
  <body>
    <div class="line"><span class="lab">--text-wordmark 28</span><span class="s" style="font-family:var(--font-serif);font-size:28px;font-weight:500">Wordmark</span></div>
    <div class="line"><span class="lab">--text-display 24</span><span class="s" style="font-family:var(--font-serif);font-size:24px;font-weight:500">Display</span></div>
    <div class="line"><span class="lab">--text-section 17</span><span class="s" style="font-size:17px;font-weight:600">Section title</span></div>
    <div class="line"><span class="lab">--text-card-title 15.5</span><span class="s" style="font-size:15.5px;font-weight:600">Card title</span></div>
    <div class="line"><span class="lab">--text-body 14</span><span class="s" style="font-size:14px">Body copy</span></div>
    <div class="line"><span class="lab">--text-caption 12.5</span><span class="s" style="font-size:12.5px;color:var(--ink-2)">Caption / reason</span></div>
    <div class="line"><span class="lab">--text-tag 10.5</span><span class="s" style="font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-2)">Disposition tag</span></div>
  </body>
</html>
