<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PR Review Queue</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --line:#30363d; --txt:#e6edf3; --dim:#8b949e;
          --red:#f85149; --amber:#d29922; --green:#3fb950; --blue:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
         background:var(--bg); color:var(--txt); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:16px; position:sticky; top:0; background:var(--bg); }
  header h1 { font-size:15px; margin:0; }
  .safe { background:var(--amber); color:#000; padding:2px 8px; border-radius:4px; font-weight:700; }
  .meta { color:var(--dim); }
  main { padding:20px; max-width:1100px; margin:0 auto; }
  .section-h { color:var(--dim); text-transform:uppercase; letter-spacing:.08em;
               font-size:11px; margin:24px 0 8px; }
  .pr { background:var(--card); border:1px solid var(--line); border-radius:8px;
        margin-bottom:12px; overflow:hidden; }
  .pr.needsYou { border-color:var(--red); }
  .pr-head { padding:10px 14px; display:flex; gap:10px; align-items:baseline;
             border-bottom:1px solid var(--line); }
  .pr-head a { color:var(--blue); text-decoration:none; font-weight:600; }
  .pill { font-size:11px; padding:1px 7px; border-radius:10px; border:1px solid var(--line); color:var(--dim); }
  .pill.req { color:var(--amber); border-color:var(--amber); }
  .pill.appr { color:var(--green); border-color:var(--green); }
  .thread { padding:10px 14px; border-bottom:1px dashed var(--line); }
  .thread:last-child { border-bottom:0; }
  .tag { font-weight:700; margin-right:8px; }
  .tag.hash-out { color:var(--red); }
  .tag.agree-fix { color:var(--green); }
  .tag.waiting-reviewer { color:var(--dim); }
  .loc { color:var(--dim); }
  .body { margin:6px 0; white-space:pre-wrap; color:#c9d1d9; }
  .reason { color:var(--dim); font-style:italic; font-size:12px; }
  .actions { margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  button { font:inherit; background:#21262d; color:var(--txt); border:1px solid var(--line);
           padding:4px 12px; border-radius:6px; cursor:pointer; }
  button.discuss { border-color:var(--red); color:var(--red); }
  button:hover { background:#30363d; }
  textarea { width:100%; background:#0d1117; color:var(--txt); border:1px solid var(--line);
             border-radius:6px; padding:6px; margin-top:6px; resize:vertical; }
  .stub { color:var(--amber); font-size:12px; }
  .empty { color:var(--dim); padding:8px 0; }
</style>
</head>
<body>
<header>
  <h1>PR Review Queue</h1>
  <span id="safe"></span>
  <span class="meta" id="meta"></span>
  <button onclick="load()" style="margin-left:auto">refresh</button>
</header>
<main id="root"></main>
<script>
async function send(payload) {
  const r = await fetch('/decision', { method:'POST', body: JSON.stringify(payload) });
  const j = await r.json();
  alert(j.safeMode ? `SAFE_MODE on — recorded, nothing executed.\n${JSON.stringify(j.spawn)}`
                   : `sent: ${JSON.stringify(j.spawn)}`);
}
function thread(prKey, t) {
  if (t.error) return `<div class="thread"><span class="tag waiting-reviewer">ERROR</span>${t.error}</div>`;
  const id = `${prKey}::${t.threadId}`;
  const discuss = t.tier === 'hash-out'
    ? `<button class="discuss" onclick='send({action:"discuss",prKey:"${prKey}",threadId:"${t.threadId}"})'>Discuss in terminal</button>
       <textarea rows="2" placeholder="your rebuttal (recorded; posting gated by SAFE_MODE)"
                 onchange='send({action:"note",prKey:"${prKey}",threadId:"${t.threadId}",note:this.value})'></textarea>`
    : t.tier === 'agree-fix'
    ? `<button onclick='send({action:"approve-fix",prKey:"${prKey}",threadId:"${t.threadId}"})'>Approve fix</button>
       <button onclick='send({action:"skip",prKey:"${prKey}",threadId:"${t.threadId}"})'>Skip</button>`
    : `<span class="reason">no action needed</span>`;
  return `<div class="thread">
    <span class="tag ${t.tier}">${t.tier.toUpperCase()}</span>
    <span class="loc">${t.path||''}:${t.line||'?'}</span> · @${t.author}
    <div class="body">${(t.body||'').replace(/</g,'&lt;').slice(0,400)}</div>
    <div class="reason">↳ ${t.reason||''}</div>
    <div class="actions">${discuss}</div>
  </div>`;
}
function pr(p) {
  const pk = `${p.repo}#${p.number}`;
  const decClass = p.reviewDecision==='APPROVED'?'appr':p.reviewDecision==='REVIEW_REQUIRED'?'req':'';
  const ths = p.threads.length ? p.threads.map(t=>thread(pk,t)).join('') : '<div class="empty">no unresolved feedback</div>';
  const jiraBox = p.needsJira
    ? `<div class="thread"><span class="tag hash-out">NEEDS JIRA</span>
         compliance check failing — PR title has no ticket. Enter one to fix the title:
         <div class="actions">
           <input id="jira-${pk}" placeholder="ABC-123" style="font:inherit;background:#0d1117;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:4px 8px;width:120px"/>
           <button onclick='send({action:"set-jira",prKey:"${pk}",ticket:document.getElementById("jira-${pk}").value})'>Set ticket</button>
         </div></div>`
    : '';
  const healthPills =
    (p.behindBase?'<span class="pill req">behind base</span>':'')
  + (p.ciFailing?`<span class="pill req">CI: ${(p.branchHealth.failingChecks||[]).map(c=>c.name).join(', ')}</span>`:'');
  return `<div class="pr ${p.needsYou?'needsYou':''}">
    <div class="pr-head">
      <a href="${p.url}" target="_blank">${pk}</a>
      <span>${p.title.replace(/</g,'&lt;')}</span>
      <span class="pill ${decClass}">${p.reviewDecision}</span>
      ${p.isDraft?'<span class="pill">draft</span>':''}
      ${p.autoFixable?`<span class="pill">${p.autoFixable} auto-fixable</span>`:''}
      ${healthPills}
    </div>${jiraBox}${ths}</div>`;
}
async function load() {
  const s = await (await fetch('/state.json')).json();
  document.getElementById('safe').innerHTML = s.safeMode ? '<span class="safe">SAFE MODE — no writes/pushes</span>' : '';
  document.getElementById('meta').textContent = `${s.prs.length} PRs · ${s.prs.filter(p=>p.needsYou).length} need you · ${s.updatedAt||''}`;
  const needs = s.prs.filter(p=>p.needsYou);
  const fixable = s.prs.filter(p=>!p.needsYou && p.autoFixable);
  const waiting = s.prs.filter(p=>!p.needsYou && !p.autoFixable);
  document.getElementById('root').innerHTML =
    `<div class="section-h">① Needs you — hash out</div>${needs.map(pr).join('')||'<div class="empty">nothing flagged</div>'}`
  + `<div class="section-h">② Agree + fix (auto once trusted)</div>${fixable.map(pr).join('')||'<div class="empty">none</div>'}`
  + `<div class="section-h">③ Waiting on reviewer / no action</div>${waiting.map(pr).join('')}`;
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
