<!-- @dsCard group="Colors" viewport="700x180" subtitle="Page, card and inset surfaces" name="Ground & surfaces" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { padding: 24px; }
      .row { display: flex; gap: 14px; flex-wrap: wrap; }
      .sw { display: flex; flex-direction: column; gap: 8px; }
      .chip { width: 120px; height: 64px; border-radius: var(--radius-card); border: 1px solid var(--line); }
      .lab { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); line-height: 1.5; }
      .lab b { color: var(--ink); font-weight: 500; display: block; }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="lab"><b>--bg</b>#1E211F</div></div>
      <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="lab"><b>--surface</b>#262A27</div></div>
      <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="lab"><b>--surface-2</b>#2F3431</div></div>
    </div>
  </body>
</html>
