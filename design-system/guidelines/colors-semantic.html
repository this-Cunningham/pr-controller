<!-- @dsCard group="Colors" viewport="700x190" subtitle="Muted tints: sage (auto), praise, ochre (error)" name="Semantic tints" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { padding: 24px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      .pill { font-family: var(--font-mono); font-size: 12px; padding: 6px 11px; border-radius: var(--radius-chip); }
      .stack { display: flex; flex-direction: column; gap: 8px; }
      .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="stack"><span class="pill" style="background:var(--auto-bg);color:var(--auto-fg)">agree · auto-fix</span><span class="lab">--auto-bg / --auto-fg</span></div>
      <div class="stack"><span class="pill" style="background:var(--praise-bg);color:var(--praise-fg)">praise</span><span class="lab">--praise-bg / --praise-fg</span></div>
      <div class="stack"><span class="pill" style="background:var(--err-bg);color:var(--err-fg)">agent error</span><span class="lab">--err-bg / --err-fg</span></div>
      <div class="stack"><span class="pill" style="background:var(--surface-2);color:var(--ink-2)">neutral</span><span class="lab">--surface-2 / --ink-2</span></div>
    </div>
  </body>
</html>
