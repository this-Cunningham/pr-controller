<!-- @dsCard group="PR Controller" viewport="940x780" subtitle="Assembled dashboard — the primary product view" name="Dashboard" -->
<!-- @startingPoint section="PR Controller" subtitle="One-screen PR agent dashboard" viewport="940x780" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR Controller</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel-src" id="app" data-presets="react">
      const { useState, useEffect, useRef } = React;

      // ---- data (mock; mirrors the agent's state.json) ----
      const DATA = {
        needs: [
          { id:'pr2412', repo:'acme/web-app', number:2412, title:'Refactor auth middleware to support SSO', review:'REVIEW_REQUIRED', jira:true,
            pills:[['3 auto-fixable','auto'],['behind base','behind'],['CI failing: unit-api','ci']],
            threads:[
              { id:'t1', tag:'hashout', loc:'src/auth/middleware.ts:88', author:'@dana-k', body:'This breaks the existing token-refresh path — we short-circuit on expired tokens so the client can silently re-auth. If you drop the early return, every expired request 500s instead of refreshing. Please keep the guard.', reason:'Reviewer disputes the change — conflicting intent, your call.' },
              { id:'t2', tag:'agree', loc:'src/auth/sso.ts:142', author:'@marco', body:'Nit: use const here and destructure the config object.', reason:'Mechanical refactor — safe to auto-apply.' },
              { id:'t3', tag:'error', loc:'.github/workflows/ci.yml:30', author:'@ci-bot', body:'Step “cache restore” failed to parse — unexpected key “path”.', reason:'Agent couldn’t classify this failure.' },
            ] },
          { id:'pr874', repo:'acme/data-pipeline', number:874, title:'Add backfill job for the events table', review:'DRAFT', jira:false,
            pills:[['CI failing: lint','ci']],
            threads:[ { id:'t4', tag:'hashout', loc:'jobs/backfill.py:55', author:'@priya', body:'Backfilling synchronously will hold a lock on events for hours in prod. This needs chunking with checkpoints, or a replica. I’d block on this.', reason:'Architectural concern with prod impact — your decision.' } ] },
        ],
        auto: [
          { id:'pr2399', repo:'acme/web-app', number:2399, title:'Bump lodash to 4.17.21', review:'APPROVED', jira:false,
            pills:[['2 auto-fixable','auto']],
            threads:[
              { id:'t5', tag:'agree', loc:'package.json:24', author:'@deps-bot', body:'Lockfile is out of sync with package.json.', reason:'Regenerating lockfile — auto-applied.' },
              { id:'t6', tag:'waiting', loc:'CHANGELOG.md:1', author:'@sam', body:'LGTM once the changelog entry lands.', reason:'Waiting on the reviewer.' },
            ] },
          { id:'pr561', repo:'acme/design-system', number:561, title:'Tokenize the spacing scale', review:'REVIEW_REQUIRED', jira:false,
            pills:[['5 auto-fixable','auto'],['behind base','behind']],
            threads:[
              { id:'t7', tag:'agree', loc:'tokens/spacing.json:12', author:'@lee', body:'Base unit should be 4px, not 5.', reason:'Matches the grid — auto-fixing.' },
              { id:'t8', tag:'agree', loc:'tokens/spacing.json:30', author:'@lee', body:'Missing an xl token between lg and 2xl.', reason:'Adding per the scale spec.' },
              { id:'t10', tag:'praise', loc:'tokens/spacing.json:1', author:'@lee', body:'Really clean approach to this, thank you.', reason:'Positive feedback — no action.' },
            ] },
        ],
        waiting: [
          { id:'pr2380', repo:'acme/web-app', number:2380, title:'Docs: clarify local env setup', review:'APPROVED', jira:false, pills:[],
            threads:[
              { id:'t11', tag:'praise', loc:'README.md:42', author:'@dana-k', body:'This was overdue — much clearer now.', reason:'Positive feedback — no action.' },
              { id:'t12', tag:'waiting', loc:'README.md:60', author:'@sam', body:'One tiny follow-up in-thread, nothing blocking.', reason:'Waiting on the reviewer.' },
            ] },
          { id:'pr203', repo:'acme/infra', number:203, title:'Bump terraform aws provider to 5.x', review:'REVIEW_REQUIRED', jira:false, pills:[], threads:[] },
        ],
      };

      const tagMeta = {
        hashout:{ label:'disagree · hash out', bg:'var(--accent-bg)', fg:'var(--accent)' },
        agree:{ label:'agree · auto-fix', bg:'var(--auto-bg)', fg:'var(--auto-fg)' },
        waiting:{ label:'waiting on reviewer', bg:'var(--surface-2)', fg:'var(--ink-2)' },
        praise:{ label:'praise', bg:'var(--praise-bg)', fg:'var(--praise-fg)' },
        error:{ label:'agent error', bg:'var(--err-bg)', fg:'var(--err-fg)' },
      };
      const revMeta = {
        APPROVED:{ label:'Approved', bg:'var(--auto-bg)', fg:'var(--auto-fg)', bd:'transparent' },
        REVIEW_REQUIRED:{ label:'Review required', bg:'var(--surface-2)', fg:'var(--ink-2)', bd:'transparent' },
        DRAFT:{ label:'Draft', bg:'transparent', fg:'var(--ink-3)', bd:'var(--line-2)' },
      };
      const pillMeta = { auto:{bg:'var(--surface-2)',fg:'var(--ink-2)',dot:true}, behind:{bg:'var(--surface-2)',fg:'var(--ink-2)'}, ci:{bg:'var(--accent-bg)',fg:'var(--accent)'} };
      const mono = "var(--font-mono)";

      function Btn({ v='primary', onClick, children }) {
        const s = { primary:{background:'var(--ink)',color:'var(--bg)',border:'1px solid var(--ink)'}, outline:{background:'transparent',color:'var(--ink)',border:'1px solid var(--line-2)'}, ghost:{background:'transparent',color:'var(--ink-2)',border:'1px solid transparent'} }[v];
        return <button onClick={onClick} style={{cursor:'pointer',font:"500 13px var(--font-sans)",padding:'8px 14px',borderRadius:'var(--radius-card)',...s}}>{children}</button>;
      }

      function ThreadControls({ t, st, setSt }) {
        const [text, setText] = useState('');
        const status = st[t.id] ? st[t.id].status : 'pending';
        const set = (status, extra) => setSt(p => ({...p, [t.id]:{status, ...extra}}));
        if (t.tag === 'hashout') {
          if (status === 'rebutted') return (<>
            <div style={{marginTop:11,background:'var(--surface-2)',borderLeft:'2px solid var(--line-2)',padding:'9px 12px',borderRadius:'0 5px 5px 0',fontSize:13,lineHeight:1.5,color:'var(--ink-2)'}}>You: {st[t.id].rebuttal}</div>
            <div style={{marginTop:9,fontSize:12.5,color:'var(--auto-fg)',animation:'ws-appear .3s ease'}}>✓ Rebuttal sent to the reviewer. <a onClick={()=>set('pending')} style={{color:'var(--accent)',textDecoration:'underline',cursor:'pointer'}}>Undo</a></div>
          </>);
          return (<>
            {status==='discussing' && <div style={{marginTop:11,fontSize:12.5,color:'var(--ink-2)'}}><span style={{fontFamily:mono,color:'var(--accent)'}}>›_</span> Terminal session opened — continue there.</div>}
            <textarea rows={2} value={text} onChange={e=>setText(e.target.value)} placeholder="Why do you disagree? This goes back to the reviewer." style={{marginTop:11,width:'100%',resize:'vertical',font:"13.5px/1.5 var(--font-sans)",padding:'10px 12px',border:'1px solid var(--line-2)',borderRadius:5,background:'var(--surface)',color:'var(--ink)'}} />
            <div style={{display:'flex',gap:8,marginTop:9,flexWrap:'wrap'}}><Btn onClick={()=>set('discussing')}>Discuss in terminal</Btn><Btn v="outline" onClick={()=>{ if(text.trim()){ set('rebutted',{rebuttal:text.trim()}); setText('');} }}>Send rebuttal</Btn></div>
          </>);
        }
        if (t.tag === 'agree') {
          if (status==='approved') return <div style={{marginTop:11,fontSize:12.5,color:'var(--auto-fg)',animation:'ws-appear .3s ease'}}>✓ Fix approved — applied by the agent. <a onClick={()=>set('pending')} style={{color:'var(--accent)',textDecoration:'underline',cursor:'pointer'}}>Undo</a></div>;
          if (status==='skipped') return <div style={{marginTop:11,fontSize:12.5,color:'var(--ink-2)',animation:'ws-appear .3s ease'}}>Skipped — left for you. <a onClick={()=>set('pending')} style={{color:'var(--accent)',textDecoration:'underline',cursor:'pointer'}}>Undo</a></div>;
          return (<>
            <div style={{marginTop:11,fontSize:12.5,color:'var(--ink-2)'}}>The agent will apply this fix.</div>
            <div style={{display:'flex',gap:8,marginTop:9}}><Btn onClick={()=>set('approved')}>Approve fix</Btn><Btn v="ghost" onClick={()=>set('skipped')}>Skip</Btn></div>
          </>);
        }
        if (t.tag === 'error') {
          if (status==='discussing') return <div style={{marginTop:11,fontSize:12.5,color:'var(--ink-2)'}}><span style={{fontFamily:mono,color:'var(--accent)'}}>›_</span> Terminal session opened.</div>;
          return (<><div style={{marginTop:11,fontSize:12.5,color:'var(--ink-2)'}}>The agent couldn’t classify this automatically.</div><div style={{marginTop:9}}><Btn v="outline" onClick={()=>set('discussing')}>Open in terminal</Btn></div></>);
        }
        return <div style={{marginTop:10,fontSize:12.5,color:'var(--ink-3)',fontStyle:'italic'}}>{t.tag==='praise'?'No action needed — positive feedback.':'No action needed — waiting on the reviewer.'}</div>;
      }

      function ThreadRow({ t, st, setSt }) {
        const m = tagMeta[t.tag];
        return (
          <div style={{padding:'14px 0',borderTop:'1px solid var(--line)'}}>
            <div style={{display:'flex',flexWrap:'wrap',alignItems:'center',gap:9}}>
              <span style={{fontFamily:mono,fontSize:10.5,letterSpacing:'.07em',textTransform:'uppercase',padding:'3px 8px',borderRadius:4,background:m.bg,color:m.fg}}>{m.label}</span>
              <span style={{fontFamily:mono,fontSize:12,color:'var(--ink-3)'}}>{t.loc}</span>
              <span style={{fontFamily:mono,fontSize:12,color:'var(--ink-2)'}}>{t.author}</span>
            </div>
            <div style={{marginTop:9,maxHeight:88,overflowY:'auto',fontSize:14,lineHeight:1.5,color:'var(--ink)',paddingRight:6}}>{t.body}</div>
            <div style={{marginTop:7,fontSize:12.5,color:'var(--ink-2)',display:'flex',gap:7}}><span style={{color:'var(--ink-3)'}}>↳</span><span>{t.reason}</span></div>
            <ThreadControls t={t} st={st} setSt={setSt} />
          </div>
        );
      }

      function Jira({ pr, jira, setJira, toast }) {
        const [v, setV] = useState('');
        if (jira[pr.id]) return <div style={{marginTop:14,borderTop:'1px solid var(--line)',paddingTop:14,fontSize:12.5,color:'var(--auto-fg)'}}>✓ Linked to {jira[pr.id]} — compliance check cleared.</div>;
        return (
          <div style={{marginTop:14,borderTop:'1px solid var(--line)',paddingTop:14}}>
            <div style={{background:'var(--accent-soft)',border:'1px solid var(--accent-bg)',borderRadius:5,padding:'13px 14px'}}>
              <div style={{display:'flex',gap:9}}><span style={{color:'var(--accent)',fontSize:12}}>◆</span><div style={{fontSize:13,lineHeight:1.5}}>This PR’s title is missing a ticket key — the compliance check failed. Add one to continue.</div></div>
              <div style={{display:'flex',gap:8,marginTop:11,flexWrap:'wrap'}}>
                <input value={v} onChange={e=>setV(e.target.value)} placeholder="ABC-123" style={{font:"13px var(--font-mono)",textTransform:'uppercase',padding:'8px 11px',width:140,border:'1px solid var(--line-2)',borderRadius:5,background:'var(--surface)',color:'var(--ink)'}} />
                <Btn onClick={()=>{ if(v.trim()){ setJira(p=>({...p,[pr.id]:v.trim().toUpperCase()})); toast('Linked to '+v.trim().toUpperCase()); } }}>Set ticket</Btn>
              </div>
            </div>
          </div>
        );
      }

      function Card({ pr, needsYou, st, setSt, jira, setJira, toast }) {
        const rm = revMeta[pr.review];
        return (
          <div style={{position:'relative',overflow:'hidden',background:'var(--surface)',border:'1px solid var(--line)',borderRadius:5,padding:'18px 20px 18px 22px',animation:'ws-appear .3s ease'}}>
            {needsYou && <><div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:'var(--accent)'}} /><div style={{position:'absolute',top:15,right:15,width:9,height:9,borderRadius:'50%',background:'var(--accent)'}} /></>}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
              <div style={{minWidth:0}}>
                <a href="#" style={{display:'inline-block',fontFamily:mono,fontSize:12.5,color:'var(--ink-2)',textDecoration:'none',borderBottom:'1px solid var(--line-2)',paddingBottom:1}}>{pr.repo} #{pr.number}</a>
                <div style={{fontSize:15.5,fontWeight:600,lineHeight:1.45,marginTop:7,color:'var(--ink)'}}>{pr.title}</div>
              </div>
              <span style={{flex:'none',fontFamily:mono,fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',padding:'4px 9px',borderRadius:4,whiteSpace:'nowrap',background:rm.bg,color:rm.fg,border:'1px solid '+rm.bd}}>{rm.label}</span>
            </div>
            {pr.pills.length>0 && <div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:12}}>{pr.pills.map(([label,kind],i)=>{const pm=pillMeta[kind];return <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11.5,padding:'3px 9px',borderRadius:4,background:pm.bg,color:pm.fg}}>{pm.dot&&<span style={{width:5,height:5,borderRadius:'50%',background:'currentColor'}}/>}{label}</span>;})}</div>}
            {pr.threads.length>0 && <div style={{marginTop:14}}>{pr.threads.map(t=> <ThreadRow key={t.id} t={t} st={st} setSt={setSt} />)}</div>}
            {pr.threads.length===0 && !pr.jira && <div style={{marginTop:14,borderTop:'1px solid var(--line)',paddingTop:13,fontSize:12.5,color:'var(--ink-3)',fontStyle:'italic'}}>No open threads — waiting on the reviewer.</div>}
            {pr.jira && <Jira pr={pr} jira={jira} setJira={setJira} toast={toast} />}
          </div>
        );
      }

      function ThemeSelect() {
        const [t, setT] = useState('stone-dark');
        const opts = [['stone-dark','Stone · Dark'],['stone-light','Stone · Light'],['warm-dark','Warm · Dark'],['warm-light','Warm · Light'],['tea-dark','Tea · Dark'],['tea-light','Tea · Light']];
        return <select value={t} onChange={e=>{setT(e.target.value);document.documentElement.dataset.theme=e.target.value;}} aria-label="Theme" style={{font:"500 12.5px var(--font-sans)",color:'var(--ink-2)',background:'var(--surface)',border:'1px solid var(--line-2)',borderRadius:6,padding:'8px 11px',cursor:'pointer'}}>{opts.map(([v,l])=> <option key={v} value={v}>{l}</option>)}</select>;
      }

      function App() {
        const [mode, setMode] = useState('safe');
        const [tab, setTab] = useState('needs');
        const [loading, setLoading] = useState(true);
        const [refreshing, setRefreshing] = useState(false);
        const [updated, setUpdated] = useState('just now');
        const [toastMsg, setToastMsg] = useState(null);
        const [st, setSt] = useState({});
        const [jira, setJira] = useState({});
        const tt = useRef();
        useEffect(()=>{ const t=setTimeout(()=>setLoading(false),850); return ()=>clearTimeout(t); },[]);
        const toast = (m)=>{ setToastMsg(m); clearTimeout(tt.current); tt.current=setTimeout(()=>setToastMsg(null),2800); };

        const sections = [
          {key:'needs', title:'Needs you', caption:'Resolve these before the agent continues.', prs:DATA.needs, needsYou:true},
          {key:'auto', title:'Auto-handling', caption: mode==='live'?'The agent is fixing these — just glance.':'Paused in safe mode — these would be auto-fixed when live.', prs:DATA.auto, needsYou:false},
          {key:'waiting', title:'Waiting on reviewer', caption:'No action needed from you.', prs:DATA.waiting, needsYou:false},
        ];
        const active = sections.find(s=>s.key===tab);
        const open = DATA.needs.length+DATA.auto.length+DATA.waiting.length;

        return (
          <div style={{maxWidth:900,margin:'0 auto',padding:'34px 28px 120px'}}>
            <header style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:20,paddingBottom:22,borderBottom:'1px solid var(--line)'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
                  <h1 style={{margin:0,fontFamily:'var(--font-serif)',fontWeight:500,fontSize:28,letterSpacing:'-.01em',whiteSpace:'nowrap'}}>PR Controller</h1>
                  <button onClick={()=>{const n=mode==='live'?'safe':'live';setMode(n);toast(n==='live'?'Live — the agent will act automatically':'Safe — actions paused');}} style={{background:'none',border:'none',padding:0,cursor:'pointer',font:'inherit'}}>
                    {mode==='live'
                      ? <span style={{display:'inline-flex',alignItems:'center',gap:7,padding:'5px 12px',borderRadius:20,background:'var(--accent-bg)',color:'var(--accent)',fontSize:12,fontWeight:600}}><span style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',animation:'ws-pulse 1.6s ease-in-out infinite'}}/>Live</span>
                      : <span style={{display:'inline-flex',alignItems:'center',gap:7,padding:'5px 12px',borderRadius:20,background:'var(--surface-2)',color:'var(--ink-2)',fontSize:12,whiteSpace:'nowrap'}}><span style={{width:9,height:9,borderRadius:'50%',border:'1.5px solid var(--ink-3)'}}/>Safe — no actions taken</span>}
                  </button>
                </div>
                <div style={{marginTop:11,fontSize:13,color:'var(--ink-2)',fontFamily:mono}}>{open} open&nbsp;&nbsp;·&nbsp;&nbsp;<span style={{color:'var(--accent)'}}>{DATA.needs.length} need you</span>&nbsp;&nbsp;·&nbsp;&nbsp;updated {updated}</div>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center',flex:'none'}}><ThemeSelect /><button onClick={()=>{ if(refreshing)return; setRefreshing(true); setTimeout(()=>{setRefreshing(false);setUpdated('just now');toast('Up to date');},900); }} style={{flex:'none',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8,font:"500 13px var(--font-sans)",padding:'9px 15px',border:'1px solid var(--line-2)',borderRadius:7,background:'var(--surface)',color:'var(--ink)'}}>
                <span style={{fontSize:15,display:'inline-block',animation:refreshing?'ws-spin .9s linear infinite':'none'}}>⟳</span>{refreshing?'Refreshing…':'Refresh'}
              </button></div>
            </header>

            {loading ? (
              <div style={{marginTop:30}}>
                <div style={{fontFamily:mono,fontSize:12,color:'var(--ink-3)',marginBottom:16}}>Fetching your open pull requests…</div>
                {[1,.8,.6].map((o,i)=><div key={i} style={{background:'var(--surface)',border:'1px solid var(--line)',borderRadius:5,padding:20,opacity:o,marginBottom:14}}><div style={{height:11,width:150,background:'var(--surface-2)',borderRadius:4,animation:'ws-shimmer 1.4s ease-in-out infinite'}}/><div style={{height:16,width:'55%',background:'var(--surface-2)',borderRadius:4,marginTop:13,animation:'ws-shimmer 1.4s ease-in-out infinite'}}/></div>)}
              </div>
            ) : (
              <>
                <div style={{position:'sticky',top:0,zIndex:20,background:'var(--bg)',display:'flex',flexWrap:'wrap',borderBottom:'1px solid var(--line)',marginTop:6,paddingTop:8}}>
                  {sections.map(s=>{const a=s.key===tab;const acc=s.key==='needs'&&s.prs.length>0;return (
                    <button key={s.key} onClick={()=>setTab(s.key)} style={{background:'none',border:'none',cursor:'pointer',padding:'14px 0',marginRight:26,marginBottom:-1,display:'inline-flex',alignItems:'center',gap:8,font:"600 14.5px var(--font-sans)",color:a?'var(--ink)':'var(--ink-2)',borderBottom:'2px solid '+(a?'var(--accent)':'transparent')}}>
                      {s.title}<span style={{font:"500 11.5px var(--font-mono)",padding:'1px 8px',borderRadius:10,background:acc?'var(--accent-bg)':'var(--surface-2)',color:acc?'var(--accent)':'var(--ink-2)'}}>{s.prs.length}</span>
                    </button>);})}
                </div>
                <div style={{marginTop:34}}>
                  <div style={{fontSize:13,color:'var(--ink-2)'}}>{active.caption}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:14}}>
                    {active.prs.map(pr=> <Card key={pr.id} pr={pr} needsYou={active.needsYou} st={st} setSt={setSt} jira={jira} setJira={setJira} toast={toast} />)}
                  </div>
                </div>
              </>
            )}

            {toastMsg && <div style={{position:'fixed',left:'50%',bottom:28,transform:'translateX(-50%)',background:'var(--ink)',color:'var(--bg)',fontSize:13,padding:'11px 17px',borderRadius:8,display:'flex',alignItems:'center',gap:9,boxShadow:'var(--shadow-toast)',animation:'ws-fadeup .28s ease',zIndex:50}}><span style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)'}}/>{toastMsg}</div>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script>
      // Transform with the CLASSIC runtime so JSX compiles to React.createElement
      // (uses the global UMD React; no bundler / no jsx-runtime import).
      (function () {
        var src = document.getElementById('app').textContent;
        var code = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        (0, eval)(code);
      })();
    </script>
  </body>
</html>
