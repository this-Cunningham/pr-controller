<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/tokens/colors.css">
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/tokens/typography.css">
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/tokens/effects.css">
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/tokens/base.css">
  <link rel="stylesheet" href="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/styles.css">
  <script src="_ds/wabi-sabi-design-system-b6b92dd7-9602-4f5c-8ee1-731fe945db55/_ds_bundle.js"></script>
  <style>html,body{margin:0;height:100%;background:var(--bg);color:var(--ink)}</style>
</helmet>
<div style="{{ outerStyle }}">
  <header style="{{ headerStyle }}">
    <div style="display:flex;align-items:center;gap:16px;min-width:0;flex-wrap:wrap">
      <h1 style="{{ titleStyle }}">PR Controller</h1>
      <span title="The agent always acts for real — this only changes which PRs it watches." style="flex:none">
        <x-import component-from-global-scope="DesignSystem_220c99.ScopeBadge" scope="{{ scope }}" count="{{ scopeN }}" all-label="Watching all PRs" scoped-label="{{ scopedLabel }}" on-toggle="{{ onToggleScope }}" hint-size="auto,28px"></x-import>
      </span>
      <div style="flex:none;width:1px;height:28px;background:var(--line-2)"></div>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-3);white-space:nowrap">updated {{ updated }}</span>
    </div>
    <div style="display:flex;gap:14px;align-items:center;flex:none">
      <!-- actively-working control -->
      <div style="{{ wkCtlStyle }}">
        <span style="display:flex;align-items:center;gap:10px;height:26px">
          <span style="display:flex;align-items:center;justify-content:center;height:26px">
            <sc-if value="{{ wkShowLiveDot }}" hint-placeholder-val="{{ false }}">
              <span style="flex:none;width:7px;height:7px;border-radius:50%;background:var(--auto-fg);animation:ws-breathe var(--pulse) var(--ease-in-out) infinite"></span>
            </sc-if>
            <sc-if value="{{ wkShowStones }}" hint-placeholder-val="{{ false }}">
              <span style="display:flex;align-items:center;justify-content:center;height:26px;overflow:visible">
                <x-import component-from-global-scope="DesignSystem_220c99.OrganicLoader" variant="stones" size="{{ 30 }}" hint-size="30px,26px"></x-import>
              </span>
            </sc-if>
          </span>
          <x-import component-from-global-scope="DesignSystem_220c99.Toggle" checked="{{ working }}" disabled="{{ winding }}" on-change="{{ onToggleWorking }}" hint-size="38px,22px"></x-import>
        </span>
        <span style="{{ wkSecondaryStyle }}">{{ wkSecondaryLabel }}</span>
      </div>
      <div style="flex:none;width:1px;height:28px;background:var(--line-2)"></div>
      <button onClick="{{ onSettings }}" aria-label="Worker settings" title="Worker sensitivity" style="{{ gearStyle }}">⚙</button>
    </div>
  </header>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:120},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;swimlanes&quot;],&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;controller&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;}}">
class Component extends DCLogic {
  // Local state only powers the STANDALONE stub controller, so the toggle
  // is still interactive when this file is opened directly. When mounted by
  // the app shell it always receives the real controller via props and this
  // local state is ignored.
  state = { working: false, winding: false };

  componentWillUnmount() { clearTimeout(this._w); }

  // No real app state here — the shell owns it. This stub gives the standalone
  // file a working, clickable demo (same pattern as PRCard's stubController).
  stubController() {
    const self = this;
    const st = () => this.state;
    return {
      working: () => st().working,
      winding: () => st().winding,
      workingMode: () => (st().working ? "on" : (st().winding ? "winding" : "off")),
      workingSecondary: () => (st().working ? "Watching your PRs" : (st().winding ? "finishing 1 task" : "Paused · resting")),
      toggleWorking: () => { if (st().winding) return; self.setState({ working: !st().working, winding: false }); },
      scope: () => "scoped",
      scopeN: () => 3,
      scopedLabel: () => "Scoped · 3 PRs",
      toggleScope: () => {},
      updated: () => "just now",
      openSettings: () => {},
    };
  }

  renderVals() {
    const embedded = !!this.props.controller;
    const c = this.props.controller || (this._stub || (this._stub = this.stubController()));
    const variant = this.props.variant || "dashboard";
    const mode = c.workingMode();

    const headerStyle = variant === "swimlanes"
      ? { flex: "none", display: "flex", justifyContent: "space-between", alignItems: "center", gap: "20px", padding: "24px 32px 18px", borderBottom: "1px solid var(--line)" }
      : { display: "flex", justifyContent: "space-between", alignItems: "center", gap: "20px", paddingBottom: "22px", borderBottom: "1px solid var(--line)" };

    return {
      // standalone framing only; transparent passthrough when embedded
      outerStyle: embedded ? {} : { minHeight: "100vh", background: "var(--bg)", padding: "40px 28px" },
      headerStyle,
      titleStyle: { margin: 0, fontFamily: "var(--font-serif)", fontWeight: 500, fontSize: variant === "swimlanes" ? "27px" : "28px", letterSpacing: "-.01em", whiteSpace: "nowrap", color: "var(--ink)" },

      scope: c.scope(), scopeN: c.scopeN(), scopedLabel: c.scopedLabel(),
      onToggleScope: () => c.toggleScope(),
      updated: c.updated(),

      working: c.working(), winding: c.winding(),
      onToggleWorking: () => c.toggleWorking(),
      wkCtlStyle: { display: "inline-flex", flexDirection: "column", alignItems: "flex-end", gap: "4px", flex: "none" },
      wkSecondaryLabel: c.workingSecondary(),
      wkSecondaryStyle: { font: "400 11px var(--font-sans)", color: mode === "off" ? "var(--ink-3)" : "var(--ink-2)", textAlign: "right" },
      wkShowLiveDot: mode === "on",
      wkShowStones: mode === "winding",

      onSettings: () => c.openSettings(),
      gearStyle: { flex: "none", cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", width: "38px", height: "38px", fontSize: "16px", border: "1px solid var(--line-2)", borderRadius: "7px", background: "var(--surface)", color: "var(--ink-2)" },
    };
  }
}
</script>
</body>
</html>
