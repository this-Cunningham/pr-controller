<!-- @dsCard group="Components" viewport="700x150" subtitle="Tabs · ScopeBadge" name="Navigation" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
      .tabs { display: flex; border-bottom: 1px solid var(--line); }
      .tab { display: inline-flex; align-items: center; gap: 8px; font: 600 14.5px var(--font-sans); padding: 12px 0; margin-right: 26px; margin-bottom: -1px; color: var(--ink-2); border-bottom: 2px solid transparent; }
      .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
      .chip { font: 500 11.5px var(--font-mono); padding: 1px 8px; border-radius: var(--radius-round); background: var(--surface-2); color: var(--ink-2); }
      .chip.accent { background: var(--accent-bg); color: var(--accent); }
      .badge { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: var(--radius-round); font-size: 12px; }
      .row { display: flex; gap: 12px; }
      .dot-h { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--accent); }
      .dot-f { width: 8px; height: 8px; border-radius: 50%; background: var(--auto-fg); }
    </style>
  </head>
  <body>
    <div class="tabs">
      <span class="tab active">Needs attention <span class="chip accent">5</span></span>
      <span class="tab">In progress <span class="chip">3</span></span>
      <span class="tab">Waiting <span class="chip">4</span></span>
    </div>
    <div class="row">
      <span class="badge" style="background:var(--surface-2);color:var(--ink-2)"><span class="dot-f"></span>All</span>
      <span class="badge" style="background:var(--accent-bg);color:var(--accent);font-weight:600"><span class="dot-h"></span>Scoped · 3</span>
    </div>
  </body>
</html>
