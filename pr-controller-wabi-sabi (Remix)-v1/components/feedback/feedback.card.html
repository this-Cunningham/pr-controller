<!-- @dsCard group="Components" viewport="700x250" subtitle="Toast · Confirmation · EmptyState · Skeleton" name="Feedback" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
      .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
      .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); width: 96px; }
      .toast { background: var(--ink); color: var(--bg); font-size: 13px; padding: 11px 17px; border-radius: var(--radius-toast); display: inline-flex; align-items: center; gap: 9px; box-shadow: var(--shadow-toast); }
      .seal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
      .confirm { font-size: 12.5px; color: var(--auto-fg); }
      .undo { color: var(--accent); text-decoration: underline; margin-left: 10px; font-size: 12.5px; }
      .enso { width: 26px; height: 26px; border: 1.5px solid var(--line-2); border-top-color: transparent; border-radius: 50%; transform: rotate(-20deg); }
      .empty { display: inline-flex; align-items: center; gap: 13px; color: var(--ink-3); font-size: 13.5px; font-style: italic; }
      .skbar { background: var(--surface-2); border-radius: 4px; height: 11px; }
      .skcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-card); padding: 16px; width: 260px; }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="eyebrow">Toast</span>
      <span class="toast"><span class="seal-dot"></span>Fix approved — applied by the agent</span>
    </div>
    <div class="row">
      <span class="eyebrow">Confirmation</span>
      <span><span class="confirm">✓ Fix approved — applied by the agent.</span><span class="undo">Undo</span></span>
    </div>
    <div class="row">
      <span class="eyebrow">EmptyState</span>
      <span class="empty"><span class="enso"></span>Nothing needs you right now.</span>
    </div>
    <div class="row">
      <span class="eyebrow">Skeleton</span>
      <div class="skcard"><div class="skbar" style="width:60%"></div><div class="skbar" style="width:85%;height:16px;margin-top:12px"></div></div>
    </div>
  </body>
</html>
