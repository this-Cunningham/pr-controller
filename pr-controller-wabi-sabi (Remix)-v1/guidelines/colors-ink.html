<!-- @dsCard group="Colors" viewport="700x180" subtitle="Primary, secondary, faint text on the dark ground" name="Ink" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { padding: 24px; }
      .row { display: flex; gap: 28px; flex-wrap: wrap; align-items: flex-end; }
      .item { display: flex; flex-direction: column; gap: 6px; }
      .samp { font-family: var(--font-sans); font-size: 22px; font-weight: 500; }
      .lab { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item"><span class="samp" style="color:var(--ink)">Sumi ink</span><span class="lab">--ink · #E4E7E1</span></div>
      <div class="item"><span class="samp" style="color:var(--ink-2)">Secondary</span><span class="lab">--ink-2 · #A2A89E</span></div>
      <div class="item"><span class="samp" style="color:var(--ink-3)">Faint</span><span class="lab">--ink-3 · #6E746C</span></div>
    </div>
  </body>
</html>
