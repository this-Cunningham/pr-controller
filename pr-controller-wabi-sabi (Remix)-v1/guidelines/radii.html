<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Small radii; near-flat surfaces" name="Radii & elevation" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { padding: 24px; }
      .row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
      .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
      .box { width: 76px; height: 52px; background: var(--surface); border: 1px solid var(--line); }
      .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
      .toast { background: var(--ink); color: var(--bg); font-family: var(--font-sans); font-size: 12px; padding: 9px 14px; border-radius: var(--radius-toast); box-shadow: var(--shadow-toast); }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item"><div class="box" style="border-radius:var(--radius-chip)"></div><span class="lab">chip 4</span></div>
      <div class="item"><div class="box" style="border-radius:var(--radius-card)"></div><span class="lab">card 5</span></div>
      <div class="item"><div class="box" style="border-radius:var(--radius-control)"></div><span class="lab">control 6</span></div>
      <div class="item"><div class="box" style="border-radius:var(--radius-round)"></div><span class="lab">round 20</span></div>
      <div class="item"><div class="toast">Up to date</div><span class="lab">--shadow-toast</span></div>
    </div>
  </body>
</html>
