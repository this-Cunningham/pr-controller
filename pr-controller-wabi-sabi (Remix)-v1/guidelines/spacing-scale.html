<!-- @dsCard group="Spacing" viewport="700x160" subtitle="4 → 34px rhythm" name="Spacing scale" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body { padding: 24px; }
      .row { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
      .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
      .bar { background: var(--accent-bg); border: 1px solid var(--line-2); border-radius: 2px; width: 18px; }
      .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item"><div class="bar" style="height:4px"></div><span class="lab">4</span></div>
      <div class="item"><div class="bar" style="height:7px"></div><span class="lab">7</span></div>
      <div class="item"><div class="bar" style="height:9px"></div><span class="lab">9</span></div>
      <div class="item"><div class="bar" style="height:12px"></div><span class="lab">12</span></div>
      <div class="item"><div class="bar" style="height:14px"></div><span class="lab">14</span></div>
      <div class="item"><div class="bar" style="height:18px"></div><span class="lab">18</span></div>
      <div class="item"><div class="bar" style="height:22px"></div><span class="lab">22</span></div>
      <div class="item"><div class="bar" style="height:28px"></div><span class="lab">28</span></div>
      <div class="item"><div class="bar" style="height:34px"></div><span class="lab">34</span></div>
    </div>
  </body>
</html>
